function carregarJSONP(url){

  return new Promise((resolve, reject) => {

    const callbackName =
      'callbackDashboard_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

    const script =
      document.createElement('script');

    const tempoLimite = setTimeout(() => {

      delete window[callbackName];

      if(script && script.parentNode){
        script.parentNode.removeChild(script);
      }

      reject('Tempo limite ao carregar JSONP');

    }, 120000);

    window[callbackName] = function(dadosRecebidos){

      clearTimeout(tempoLimite);

      resolve(dadosRecebidos);

      delete window[callbackName];

      if(script && script.parentNode){
        script.parentNode.removeChild(script);
      }

    };

    script.async = true;

    script.src =
      url + '?callback=' + callbackName + '&t=' + Date.now();

    script.onerror = function(){

      clearTimeout(tempoLimite);

      delete window[callbackName];

      if(script && script.parentNode){
        script.parentNode.removeChild(script);
      }

      reject('Erro JSONP');

    };

    document.body.appendChild(script);

  });

}

function parseCSV(texto){

const linhas = texto
  .split(/\r?\n/)
  .filter(l => l.trim());

const idx = linhas.findIndex(
  l => l.includes('Razão social')
);

if(idx === -1){
  console.error('Cabeçalho não encontrado');
  return [];
}

const headers = linhas[idx]
  .split(',')
  .map(h => h.replace(/"/g,'').trim());

const resultado = [];

for(let i = idx + 1; i < linhas.length; i++){

  const linha = linhas[i];

  let valores = [];
  let atual = '';
  let dentroAspas = false;

  for(let c of linha){

    if(c === '"'){
      dentroAspas = !dentroAspas;
      continue;
    }

    if(c === ',' && !dentroAspas){
      valores.push(atual);
      atual = '';
      continue;
    }

    atual += c;
  }

  valores.push(atual);

  if(valores.length < headers.length){
    continue;
  }

  let obj = {};

  headers.forEach((h,j)=>{
    obj[h] = (valores[j] || '').trim();
  });

  resultado.push(obj);
}

return resultado.filter(
  x => x['Razão social']
);

}

function numero(v){

if(typeof v === 'number'){
return v;
}

let txt =
String(v || '').trim();

if(txt === ''){
return 0;
}

txt = txt
.replace(/R\$/g,'')
.replace(/\s/g,'')
.replace(/[^\d,.-]/g,'');

if(txt.includes('.') && txt.includes(',')){

txt =
txt.replace(/\./g,'')
.replace(',','.');

}else if(txt.includes(',')){

txt =
txt.replace(',','.');

}

const n = Number(txt);

return isNaN(n) ? 0 : n;

}

function moeda(v){

return new Intl.NumberFormat('pt-BR',{
style:'currency',
currency:'BRL'
}).format(v||0);

}

const dataFinal =

.value
.toLowerCase();

filtrados=dados.filter(x=>{

const okUF=!uf || x['UF']===uf;
const okCliente =
clientesSelecionados.length === 0 ||
clientesSelecionados.length ===
document.querySelectorAll('.clienteCheck').length
? true
: clientesSelecionados.includes(
x['Razão social']
);

const descricao =
String(x['Descrição'] || '')
.toUpperCase();

let okGrupo = true;

if(grupo){

okGrupo =
descricao.includes(grupo);

}

const okRep =
representantesSelecionados.length === 0 ||
representantesSelecionados.length ===
document.querySelectorAll('.repCheck').length
? true
: representantesSelecionados.includes(
x['Abreviação']
);

const dataFat =
String(x['Dt.faturam'] || '');

let okAno = true;

if(ano && dataFat){

if(String(dataFat).includes('/')){

okAno =
dataFat.split('/')[2] === ano;

}else{

okAno =
String(dataFat).substring(0,4) === ano;

}

}

let okData = true;

if(dataFat){

let dataLinha = '';

if(String(dataFat).includes('/')){

const [dia, mes, anoLinha] =
dataFat.split('/');

dataLinha =
`${anoLinha}-${mes}-${dia}`;

}else{

dataLinha =
String(dataFat).substring(0,10);

}

if(dataInicial){

okData =
okData &&
dataLinha >= dataInicial;

}

if(dataFinal){

okData =
okData &&
dataLinha <= dataFinal;

}

}

const produto =
(x['Desc.completa'] || '')
.toLowerCase();

const okProduto =
!buscaProduto ||
produto.includes(buscaProduto);

return okUF &&
okGrupo &&
okCliente &&
okRep &&
okAno &&
okProduto &&
okData;

});

render();

}

setTimeout(() => {

    barras(
        'produtos',
        produtosAgrupadosGlobal,
        ehMobile() ? 30 : PRODUTOS_POR_PAGINA
    );

    mostrarBotaoProdutos();

},100);

}

.sort((a,b)=>{

if(id === 'grupo'){

return b[1].valor - a[1].valor;

}

if(id === 'produtos'){

return b[1].qtd - a[1].qtd;

}

return b[1].valor - a[1].valor;

? i[1].qtd

produtos

text-align:center;
">

<div style="
font-size:10px;
color:#8fb3ff;

</div>

background:#2563eb;
height:28px;
border-radius:18px;

align-items:center;
justify-content:center;

💰 ${moeda(i[1].valor)}
</div>

</div>

i[1].qtd

if(produtoSelecionado === i[0]){

}

function detalharProduto(produto){

if(produtoSelecionado === produto){

produtoSelecionado = '';
produtoDetalheHTML = '';

render();

return;

}

produtoSelecionado = produto;

const vendas = filtrados.filter(
x => x['Desc.completa'] === produto
);

let clientes = {};

vendas.forEach(x=>{

const cli = x['Razão social'];

if(!clientes[cli]){

clientes[cli] = {
metros:0,
valor:0
};

}

clientes[cli].metros +=
numero(x['Qtd.item/Ft']);

clientes[cli].valor +=
numero(x['Valor Fat+Valor IPI+Valor Frete']);

});

let html = `
<div style="
margin:20px 0;
padding:20px;
background:#10295e;
border-radius:12px;
">

<h3 style="
margin-bottom:15px;
color:white;
">
📦 ${produto}
</h3>

<table style="
width:100%;
border-collapse:collapse;
color:white;
">
<tr>
<th align="left">Cliente</th>
<th align="right">Metros</th>
<th align="right">Faturamento</th>
</tr>
`;

Object.entries(clientes)
.sort((a,b)=>
b[1].valor - a[1].valor
)
.forEach(([cliente,dados])=>{

html += `
<tr>
<td>${cliente}</td>

<td align="right">
${dados.metros.toLocaleString('pt-BR')} m
</td>

<td align="right">
${moeda(dados.valor)}
</td>

</tr>
`;

});

html += `
</table>
</div>
`;

produtoDetalheHTML = html;

render();

}

function ufs(){

const el=document.getElementById('ufs');

const obj=agrupar('UF');

let html='';

Object.entries(obj)
.sort((a,b)=>b[1].valor-a[1].valor)
.forEach(i=>{

html += `
<div class="uf">
<strong>${i[0]}</strong>
<br><br>
${moeda(i[1].valor)}
</div>
`;

});

el.innerHTML=html;

}

function mostrarBotaoProdutos(){

  const botaoAntigo =
  document.getElementById('btnCarregarMaisProdutos');

  if(botaoAntigo){
    botaoAntigo.remove();
  }

  const totalProdutos =
  Object.keys(produtosAgrupadosGlobal).length;

  const limiteAtual =
  paginaProdutos * PRODUTOS_POR_PAGINA;

  if(limiteAtual >= totalProdutos){
    return;
  }

  const ehTelaGrande =
  window.innerWidth >= 1024;

  const textoBotao = ehTelaGrande
  ? 'Ver todos os produtos'
  : 'Carregar mais 100 produtos';

  document.getElementById('produtos').insertAdjacentHTML(
    'afterend',
    `
    <button
      id="btnCarregarMaisProdutos"
      onclick="acaoProdutos()"
      style="
        margin:25px auto;
        display:block;
        padding:12px 22px;
        border:none;
        border-radius:10px;
        background:#2563eb;
        color:white;
        font-weight:bold;
        cursor:pointer;
      ">
      ${textoBotao}
    </button>
    `
  );

}

function acaoProdutos(){

  const ehTelaGrande =
  window.innerWidth >= 1024;

  if(ehTelaGrande){

    barras(
      'produtos',
      produtosAgrupadosGlobal,
      999999
    );

    const botao =
    document.getElementById('btnCarregarMaisProdutos');

    if(botao){
      botao.remove();
    }

    return;

  }

  carregarMaisProdutos();

}

function carregarMaisProdutos(){

  paginaProdutos++;

  const limite =
  paginaProdutos * PRODUTOS_POR_PAGINA;

  barras(
    'produtos',
    produtosAgrupadosGlobal,
    limite
  );

  mostrarBotaoProdutos();

}

</script>
