<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Estoque Comercial</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- CABEÇALHO -->

    <header class="topo">

        <div class="logo">

            <img src="imagens/logo.png.jpg" alt="Smart Group">

        </div>

        <div class="titulo">

            <h1>Dashboard - Estoque Comercial</h1>

            <span>Estoque Comercial em Tempo Real</span>

        </div>

        <div class="atualizacao">

            <i class="fa-regular fa-calendar"></i>

            <span id="ultimaAtualizacao">Última atualização --</span>

        </div>

    </header>

    <!-- FILTROS -->

    <section class="barra-filtros">
   
        <select id="filtroEmpresa">

            <option value="">Todas Empresas</option>

        </select>

        <select id="filtroLocal">

            <option value="">Todos Locais</option>

        </select>

    </section>

    <!-- CARDS -->

    <section class="cards">

        <div class="card">

            <h3>📦 Produtos</h3>

            <span id="totalProdutos">0</span>

        </div>

        <div class="card">

            <h3>📏 Quantidade Total</h3>

            <span id="quantidadeTotal">0</span>

        </div>

        <div class="card">

    <h3>🏢 Empresas</h3>

    <span id="totalEmpresas">0</span>

</div>

<div class="card">

    <h3>📍 Locais</h3>

    <span id="totalLocais">0</span>

</div>

    </section>

    <!-- GRÁFICOS -->

    <section class="graficos">

        
        <!-- TOP PRODUTOS -->

<div class="card-grafico card-top-produtos">

    <div class="cabecalho-top-produtos">

        <div class="titulo-card titulo-top-produtos">
            🏆 Produtos com Maior Estoque
        </div>

        <select id="quantidadeTopProdutos" class="seletor-top-produtos">

            <option value="5">Top 5</option>
            <option value="10" selected>Top 10</option>
            <option value="15">Top 15</option>
            <option value="20">Top 20</option>

        </select>

    </div>

    <div
        id="rankingTopProdutos"
        class="ranking-top-produtos">
<div class="sem-dados">
    Carregando dados do estoque...
</div>

    </div>

</div>

<!-- FAMÍLIA -->

    <div class="card-grafico">

        <div class="titulo-card">
            📊 Estoque por Família de Material
        </div>

        <button id="limparFamilia" class="btn-limpar">
            Limpar filtro
        </button>

        <div class="grafico-familia-container">

            <div
                id="rankingFamilias"
                class="ranking-familias">
            </div>

        </div>

    </div>

</section>

    <!-- TABELA -->

    <section class="produtos">

        <div class="titulo-produtos">

            <h2>📦 Produtos</h2>

<div class="barra-pesquisa-tabela">

    <input
        type="text"
        id="pesquisaProduto"
        placeholder="Pesquisar código ou descrição...">

</div>


            <span id="familiaSelecionada"></span>

        </div>

   <div class="tabela-scroll">

    <table>

        <thead>

            <tr>

    <th>Código</th>

    <th>Produto</th>

    <th>Saldo Total</th>

</tr>

        </thead>

        <tbody id="tabelaProdutos">

            </tbody>
    </table>

</div>

    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="./js/util.js"></script>
<script src="./js/processamento.js"></script>
<script src="./js/cards.js"></script>

<script src="./js/graficoLocal.js?v=4"></script>

<script src="./js/agruparProdutos.js"></script>
<script src="./js/graficoFamilia.js?v=6"></script>
<script src="./js/tabela.js"></script>
<script src="./js/filtros.js"></script>
<script src="./js/excel.js"></script>
<script src="./js/app.js?v=6"></script>


</body>

</html>
